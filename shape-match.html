<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{ --sky1:#D6E9FF; --sky2:#FFE2F0; }
  html,body{ height:100%; overflow:hidden; overscroll-behavior:none; }
  body{
    font-family:'Baloo 2',cursive,sans-serif;
    background:linear-gradient(160deg,var(--sky1),var(--sky2));
    display:flex; flex-direction:column; align-items:center;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  h1{ margin:12px 0 2px; font-size:clamp(24px,5.5vw,46px); font-weight:800; color:#fff;
    letter-spacing:1px; text-shadow:0 4px 0 #3FA9FF, 0 8px 14px rgba(0,0,0,.18); }
  .menu-btn{ position:fixed; top:14px; left:14px; z-index:1800; text-decoration:none;
    font-size:26px; background:#fff; width:50px; height:50px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 rgba(0,0,0,.15); }
  .menu-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15); }

  .stage{ flex:1; width:100%; max-width:1200px; display:flex; flex-direction:column;
    gap:6px; padding:4px 12px 10px; min-height:0; }

  /* outline shape slots */
  .slots{ display:grid; grid-template-columns:repeat(5,1fr); gap:clamp(4px,1vw,14px);
    flex:0 0 auto; justify-items:center; }
  .slot{ position:relative; width:100%; max-width:185px;
    display:flex; flex-direction:column; align-items:center; gap:2px; transition:transform .15s; }
  .shapebox{ position:relative; width:100%; aspect-ratio:1; }
  .shapebox svg{ width:100%; height:100%; display:block; overflow:visible; }
  .name{ font-size:clamp(12px,2.2vw,20px); font-weight:800; color:#444; text-transform:capitalize;
    letter-spacing:.5px; }
  .slot.hot{ transform:scale(1.1); }
  .slot.done .ghost{ display:none; }

  /* face overlay */
  .face .eye{ fill:#2B2B2B; transform-box:fill-box; transform-origin:center;
    animation:blink 4s infinite; }
  .face .mouth{ fill:none; stroke:#2B2B2B; stroke-width:4; stroke-linecap:round; }
  .face .cheek{ fill:#FF8FB0; opacity:.55; }
  @keyframes blink{ 0%,92%,100%{ transform:scaleY(1) } 95%,97%{ transform:scaleY(.1) } }

  /* tray */
  .tray{ flex:1 1 auto; min-height:0; overflow:hidden;
    display:grid; grid-template-columns:repeat(5,1fr); gap:clamp(4px,1vw,14px);
    align-content:center; justify-items:center; padding:6px; }
  .shape{ width:100%; max-width:185px; aspect-ratio:1; position:relative;
    cursor:grab; touch-action:none; transition:transform .12s ease;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,.22)); }
  .shape svg{ width:100%; height:100%; display:block; overflow:visible; }
  .shape:active{ cursor:grabbing; }
  .shape.lifted{ position:fixed; z-index:999; pointer-events:none; transition:none;
    filter:drop-shadow(0 14px 14px rgba(0,0,0,.3)); }
  .shape.placed{ visibility:hidden; }

  .win{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center;
    justify-content:center; gap:18px; background:rgba(255,255,255,.85);
    backdrop-filter:blur(4px); z-index:2000; }
  .win.show{ display:flex; animation:pop .4s ease; }
  .win .big{ font-size:clamp(50px,14vw,110px); }
  .win h2{ font-size:clamp(30px,7vw,60px); color:#3FA9FF; font-weight:800; }
    .nextnote{ font-size:clamp(15px,3vw,22px); font-weight:800; color:#888; }
  .again{ font-family:inherit; font-size:26px; font-weight:800; color:#fff;
    background:#4ECB5B; border:none; border-radius:40px; padding:14px 44px;
    box-shadow:0 6px 0 #2f9e3a; cursor:pointer; }
  .again:active{ transform:translateY(4px); box-shadow:0 2px 0 #2f9e3a; }
  @keyframes pop{ from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes wob{ 0%,100%{transform:rotate(0)} 25%{transform:rotate(-7deg)} 75%{transform:rotate(7deg)} }
  .cheer{ animation:wob .5s ease !important; }
  .confetti{ position:fixed; width:12px; height:12px; z-index:1500; border-radius:2px; pointer-events:none; }

<body>
  <h1>Match The Shape</h1>
  <a class="menu-btn" href="index.html">🏠</a>
  <div class="stage">
    <div class="slots" id="slots"></div>
    <div class="tray" id="tray"></div>
  </div>

  <div class="win" id="win">
    <div class="big">⭐🎉⭐</div>
    <h2>You Did It!</h2>
    <div class="nextnote">Next game starting…</div>
    <button class="again" onclick="start()">Play Again</button>
  </div>

<script src="common.js"></script>
<script>
// each shape returns an SVG path/points string drawn in a 100x100 viewBox
const SHAPES = {
  square:    {col:"#FF4D4D", el:`<rect x="14" y="14" width="72" height="72" rx="8"/>`,           cy:50},
  circle:    {col:"#3FA9FF", el:`<circle cx="50" cy="50" r="38"/>`,                                cy:50},
  triangle:  {col:"#4ECB5B", el:`<polygon points="50,12 90,86 10,86"/>`,                          cy:62},
  rectangle: {col:"#FF8C24", el:`<rect x="8" y="28" width="84" height="44" rx="8"/>`,             cy:50},
  oval:      {col:"#9B5DE5", el:`<ellipse cx="50" cy="50" rx="42" ry="28"/>`,                     cy:50},
  star:      {col:"#FFD23F", el:`<polygon points="50,8 61,38 93,38 67,58 77,90 50,70 23,90 33,58 7,38 39,38"/>`, cy:52},
  hexagon:   {col:"#FF6FB5", el:`<polygon points="28,14 72,14 92,50 72,86 28,86 8,50"/>`,         cy:50},
  diamond:   {col:"#2DD4BF", el:`<polygon points="50,8 90,50 50,92 10,50"/>`,                     cy:50},
  pentagon:  {col:"#6B7480", el:`<polygon points="50,10 90,40 74,88 26,88 10,40"/>`,             cy:52},
};
const ORDER = ["square","circle","triangle","rectangle","oval","star","hexagon","diamond","pentagon"];

function faceSVG(name, cy){
  const e=cy-6;       // eye line
  const m=cy+6;       // mouth line
  const cheeks=`<circle class="cheek" cx="34" cy="${cy+4}" r="4"/><circle class="cheek" cx="66" cy="${cy+4}" r="4"/>`;
  const faces = {
    // happy smile
    square: `<ellipse class="eye" cx="40" cy="${e}" rx="4" ry="5.5"/><ellipse class="eye" cx="60" cy="${e}" rx="4" ry="5.5"/>
      ${cheeks}<path class="mouth" d="M41 ${m} Q50 ${m+9} 59 ${m}"/>`,
    // big grin open mouth
    circle: `<ellipse class="eye" cx="40" cy="${e}" rx="4.5" ry="6"/><ellipse class="eye" cx="60" cy="${e}" rx="4.5" ry="6"/>
      ${cheeks}<path class="mouth" d="M40 ${m} Q50 ${m+13} 60 ${m} Z" fill="#2B2B2B"/>`,
    // wink
    triangle: `<ellipse class="eye" cx="40" cy="${e}" rx="4" ry="5.5"/><path class="mouth" d="M55 ${e} q5 -4 10 0"/>
      ${cheeks}<path class="mouth" d="M42 ${m} Q50 ${m+8} 58 ${m}"/>`,
    // sleepy / content (curved eyes)
    rectangle: `<path class="mouth" d="M35 ${e} q5 5 10 0"/><path class="mouth" d="M55 ${e} q5 5 10 0"/>
      ${cheeks}<path class="mouth" d="M42 ${m} Q50 ${m+7} 58 ${m}"/>`,
    // surprised O
    oval: `<circle class="eye" cx="40" cy="${e}" r="4.5"/><circle class="eye" cx="60" cy="${e}" r="4.5"/>
      ${cheeks}<ellipse cx="50" cy="${m+3}" rx="6" ry="7" fill="#2B2B2B"/>`,
    // star eyes :D
    star: `<ellipse class="eye" cx="40" cy="${e}" rx="4" ry="6"/><ellipse class="eye" cx="60" cy="${e}" rx="4" ry="6"/>
      ${cheeks}<path class="mouth" d="M40 ${m} Q50 ${m+12} 60 ${m}"/>`,
    // cheeky tongue
    hexagon: `<ellipse class="eye" cx="40" cy="${e}" rx="4" ry="5.5"/><ellipse class="eye" cx="60" cy="${e}" rx="4" ry="5.5"/>
      ${cheeks}<path class="mouth" d="M42 ${m} Q50 ${m+9} 58 ${m}"/><path d="M48 ${m+4} q4 6 8 0 Z" fill="#FF5B8A"/>`,
    // cool tiny smile
    diamond: `<ellipse class="eye" cx="40" cy="${e}" rx="3.5" ry="5"/><ellipse class="eye" cx="60" cy="${e}" rx="3.5" ry="5"/>
      ${cheeks}<path class="mouth" d="M44 ${m+2} h12"/>`,
    // laughing ^ ^
    pentagon: `<path class="mouth" d="M36 ${e+2} q4 -6 8 0"/><path class="mouth" d="M56 ${e+2} q4 -6 8 0"/>
      ${cheeks}<path class="mouth" d="M40 ${m} Q50 ${m+11} 60 ${m}"/>`,
  };
  return `<g class="face">${faces[name]||faces.square}</g>`;
}

function shapeSVG(name, mode){
  const s=SHAPES[name];
  const fill = mode==='outline' ? 'rgba(255,255,255,.4)' : s.col;
  const stroke = s.col;
  const sw = mode==='outline' ? 4 : 0;
  const cls = mode==='outline' ? 'ghost' : '';
  return `<svg class="${cls}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <g fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round">${s.el}</g>
    ${mode==='full' ? faceSVG(name, s.cy) : ''}
  </svg>`;
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

const slots = document.getElementById('slots');
const tray = document.getElementById('tray');
const win = document.getElementById('win');
let matched = 0;

function start(){
  win.classList.remove('show');
  slots.innerHTML=''; tray.innerHTML=''; matched=0;

  ORDER.forEach(name=>{
    const s=document.createElement('div');
    s.className='slot'; s.dataset.id=name;
    s.innerHTML=`<div class="shapebox">${shapeSVG(name,'outline')}</div><div class="name">${name}</div>`;
    slots.appendChild(s);
  });

  shuffle([...ORDER]).forEach(name=>{
    const f=document.createElement('div');
    f.className='shape'; f.dataset.id=name;
    f.innerHTML=shapeSVG(name,'full');
    attachDrag(f);
    tray.appendChild(f);
  });
}

let active=null, offX=0, offY=0;

function attachDrag(el){
  el.addEventListener('pointerdown', e=>{
    if(el.classList.contains('placed')) return;
    active=el;
    const r=el.getBoundingClientRect();
    offX=e.clientX-r.left; offY=e.clientY-r.top;
    el.classList.add('lifted');
    el.style.width=r.width+'px'; el.style.height=r.height+'px';
    move(e.clientX,e.clientY);
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e=>{ if(active===el) move(e.clientX,e.clientY); });
  el.addEventListener('pointerup', e=>{ if(active===el) drop(e.clientX,e.clientY); });
}

function move(x,y){
  active.style.left=(x-offX)+'px';
  active.style.top=(y-offY)+'px';
  highlight(x,y);
}

function currentSlot(x,y){
  for(const s of slots.querySelectorAll('.slot')){
    const r=s.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return s;
  }
  return null;
}

function highlight(x,y){
  slots.querySelectorAll('.slot').forEach(s=>s.classList.remove('hot'));
  const s=currentSlot(x,y);
  if(s&&!s.classList.contains('done')&&s.dataset.id===active.dataset.id) s.classList.add('hot');
}

function drop(x,y){
  const el=active; active=null;
  slots.querySelectorAll('.slot').forEach(s=>s.classList.remove('hot'));
  const s=currentSlot(x,y);
  el.classList.remove('lifted');
  el.style.position=''; el.style.left=''; el.style.top='';
  el.style.width=''; el.style.height=''; el.style.zIndex='';
  if(s && !s.classList.contains('done') && s.dataset.id===el.dataset.id){
    s.classList.add('done');
    const box=s.querySelector('.shapebox');
    box.innerHTML=shapeSVG(s.dataset.id,'full');
    s.classList.add('cheer');
    setTimeout(()=>s.classList.remove('cheer'),500);
    el.classList.add('placed');
    burst(s);
    playCorrect();
    speak(s.dataset.id);
    matched++;
    if(matched===ORDER.length) setTimeout(()=>{ playWin(); win.classList.add('show'); scheduleNextGame(); },400);
  } else if(s){
    // dropped on a slot but it's the wrong shape
    sayUhOh();
  }
}

function burst(node){
  const r=node.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const cols=['#FFD23F','#FF6FB5','#4ECB5B','#3FA9FF','#FF8C24','#9B5DE5'];
  for(let i=0;i<14;i++){
    const c=document.createElement('div');
    c.className='confetti'; c.style.background=cols[i%cols.length];
    c.style.left=cx+'px'; c.style.top=cy+'px';
    document.body.appendChild(c);
    const ang=Math.random()*Math.PI*2, dist=60+Math.random()*70;
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    c.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${dx}px,${dy+60}px) rotate(${Math.random()*360}deg) scale(.3)`,opacity:0}
    ],{duration:700,easing:'ease-out'}).onfinish=()=>c.remove();
  }
}

start();
</script>
</body>
