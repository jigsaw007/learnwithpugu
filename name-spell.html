<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Spell My Name — Name Game | Learn with Pugu</title>
<meta name="description" content="A fun name-spelling game for kids — drag the colorful letters to spell the name on Learn with Pugu.">
<meta name="theme-color" content="#9B5DE5">
<link rel="canonical" href="https://learnwithpugu.com/name-spell.html">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pugu">
<meta name="mobile-web-app-capable" content="yes">

<meta property="og:type" content="website">
<meta property="og:site_name" content="Learn with Pugu">
<meta property="og:title" content="Spell My Name — Learn with Pugu">
<meta property="og:url" content="https://learnwithpugu.com/name-spell.html">
<meta property="og:image" content="https://learnwithpugu.com/icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{ --sky1:#FFF0C7; --sky2:#FFD6F0; }
  html,body{ height:100%; overflow:hidden; overscroll-behavior:none; }
  body{
    font-family:'Baloo 2',cursive,sans-serif;
    background:linear-gradient(160deg,var(--sky1),var(--sky2));
    display:flex; flex-direction:column; align-items:center;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  .menu-btn{ position:fixed; top:14px; left:14px; z-index:1800; text-decoration:none;
    font-size:26px; background:#fff; width:50px; height:50px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 rgba(0,0,0,.15); }
  .menu-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15); }

  .stage{ flex:1; width:100%; max-width:1200px; min-height:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:8px 12px 14px; gap:10px; }
  .title{ margin-top:0 !important; }
  #targets{ margin-bottom:6px; }
  .tray{ margin-top:auto; }

  .title{ font-size:clamp(20px,4.5vw,38px); font-weight:800; color:#fff;
    text-shadow:0 3px 0 #FF6FB5, 0 6px 12px rgba(0,0,0,.18); text-align:center; margin-top:6px; }

  /* center image */
  .photo{ width:clamp(150px,28vw,280px); aspect-ratio:1; border-radius:50%;
    object-fit:cover; background:#fff; border:6px solid #fff;
    box-shadow:0 8px 18px rgba(0,0,0,.2); }
  .photo-fallback{ width:clamp(150px,28vw,280px); aspect-ratio:1; border-radius:50%;
    background:radial-gradient(circle at 50% 40%, #FFE07A, #FF8FC7);
    display:flex; align-items:center; justify-content:center; font-size:clamp(40px,9vw,80px);
    border:6px solid #fff; box-shadow:0 8px 18px rgba(0,0,0,.2); }

  /* rows of letters */
  .word{ display:flex; flex-wrap:wrap; justify-content:center; gap:clamp(3px,0.8vw,8px); }
  .word + .word{ margin-top:6px; }
  .gap{ width:clamp(24px,5vw,60px); }     /* space between first & last name */

  .cell{ width:clamp(44px,8vw,86px); aspect-ratio:1; border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:clamp(28px,5.6vw,60px);
    transition:transform .15s; }

  /* outline target letter */
  .slot{ color:rgba(0,0,0,.12);
    background:rgba(255,255,255,.4);
    box-shadow:inset 0 0 0 4px var(--c, rgba(180,180,180,.6)); }
  .slot.hot{ transform:scale(1.12); }
  .slot.done{ color:#fff; background:var(--c); box-shadow:0 4px 8px rgba(0,0,0,.18); }

  .tray{ display:flex; flex-wrap:wrap; justify-content:center; gap:clamp(4px,1vw,12px);
    padding:8px; }
  .tile{ width:clamp(40px,7vw,74px); aspect-ratio:1; border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:clamp(26px,5vw,52px); color:#fff;
    background:var(--c); box-shadow:0 5px 8px rgba(0,0,0,.22);
    cursor:grab; touch-action:none; transition:transform .12s ease; }
  .tile:active{ cursor:grabbing; }
  .tile.lifted{ position:fixed; z-index:999; pointer-events:none; transition:none;
    box-shadow:0 16px 16px rgba(0,0,0,.3); }
  .tile.placed{ visibility:hidden; }

  .win{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center;
    justify-content:center; gap:18px; background:rgba(255,255,255,.88);
    backdrop-filter:blur(4px); z-index:2000; }
  .win.show{ display:flex; animation:pop .4s ease; }
  .win .big{ font-size:clamp(50px,14vw,110px); }
  .win h2{ font-size:clamp(26px,6vw,52px); color:#FF6FB5; font-weight:800; text-align:center; }
    .nextnote{ font-size:clamp(15px,3vw,22px); font-weight:800; color:#888; }
  .again{ font-family:inherit; font-size:26px; font-weight:800; color:#fff;
    background:#4ECB5B; border:none; border-radius:40px; padding:14px 44px;
    box-shadow:0 6px 0 #2f9e3a; cursor:pointer; }
  .again:active{ transform:translateY(4px); box-shadow:0 2px 0 #2f9e3a; }
  @keyframes pop{ from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes wob{ 0%,100%{transform:rotate(0)} 25%{transform:rotate(-7deg)} 75%{transform:rotate(7deg)} }
  .cheer{ animation:wob .5s ease !important; }
  .confetti{ position:fixed; width:12px; height:12px; z-index:1500; border-radius:2px; pointer-events:none; }
</style>
</head>
<body>
  <a class="menu-btn" href="index.html">🏠</a>
  <div class="stage">
    <div class="title">Hi! My name is</div>
    <img class="photo" id="photo" src="pugu.jpg" alt="photo"
         onerror="this.outerHTML='<div class=&quot;photo-fallback&quot;>👶</div>'">
    <div id="targets"></div>
    <div class="tray" id="tray"></div>
  </div>

  <div class="win" id="win">
    <div class="big">🎉👑🎉</div>
    <h2 id="winName">AADHYAVI JOSHI!</h2>
    <div class="nextnote">Next game starting…</div>
    <button class="again" onclick="start()">Play Again</button>
  </div>

<script src="common.js"></script>
<script>
const NAME = "AADHYAVI JOSHI";   // space separates the two words
const PALETTE = ["#FF4D4D","#FF8C24","#FFC400","#4ECB5B","#3FA9FF","#9B5DE5","#FF5BA3","#2DD4BF","#FF6FB5","#7CB342","#E0529C","#FF7043","#5C6BC0"];

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

const targets = document.getElementById('targets');
const tray = document.getElementById('tray');
const win = document.getElementById('win');
document.getElementById('winName').textContent = NAME + "!";

let needed=0, placed=0;

function start(){
  win.classList.remove('show');
  targets.innerHTML=''; tray.innerHTML=''; placed=0;

  // build outline slots, grouped by word, each letter coloured
  const words = NAME.split(' ');
  let colorIdx=0;
  const letterList=[]; // {ch, color, key}
  const wrap=document.createElement('div'); // holds word rows centered
  wrap.style.display='flex'; wrap.style.flexWrap='wrap'; wrap.style.justifyContent='center';
  wrap.style.alignItems='center'; wrap.style.gap='0';

  words.forEach((w,wi)=>{
    const row=document.createElement('div'); row.className='word';
    [...w].forEach(ch=>{
      const color = PALETTE[colorIdx % PALETTE.length];
      const key = ch + '|' + colorIdx;     // unique per letter position (letter+color must match)
      colorIdx++;
      const slot=document.createElement('div');
      slot.className='cell slot'; slot.dataset.ch=ch; slot.dataset.key=key;
      slot.style.setProperty('--c', color);
      slot.textContent=ch;
      row.appendChild(slot);
      letterList.push({ch, color, key});
    });
    wrap.appendChild(row);
    if(wi < words.length-1){ const g=document.createElement('div'); g.className='gap'; wrap.appendChild(g); }
  });
  targets.appendChild(wrap);
  needed = letterList.length;

  // build scrambled draggable tiles (one per letter, carrying its color key)
  shuffle([...letterList]).forEach(({ch,color,key})=>{
    const t=document.createElement('div');
    t.className='tile'; t.dataset.ch=ch; t.dataset.key=key;
    t.style.setProperty('--c', color);
    t.textContent=ch;
    attachDrag(t);
    tray.appendChild(t);
  });
}

let active=null, offX=0, offY=0;

function attachDrag(el){
  el.addEventListener('pointerdown', e=>{
    if(el.classList.contains('placed')) return;
    active=el;
    const r=el.getBoundingClientRect();
    offX=e.clientX-r.left; offY=e.clientY-r.top;
    el.classList.add('lifted');
    el.style.width=r.width+'px'; el.style.height=r.height+'px';
    move(e.clientX,e.clientY);
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e=>{ if(active===el) move(e.clientX,e.clientY); });
  el.addEventListener('pointerup', e=>{ if(active===el) drop(e.clientX,e.clientY); });
}

function move(x,y){
  active.style.left=(x-offX)+'px';
  active.style.top=(y-offY)+'px';
  highlight(x,y);
}

function slotAt(x,y){
  for(const s of targets.querySelectorAll('.slot')){
    const r=s.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return s;
  }
  return null;
}

function highlight(x,y){
  targets.querySelectorAll('.slot').forEach(s=>s.classList.remove('hot'));
  const s=slotAt(x,y);
  if(s && !s.classList.contains('done') && s.dataset.key===active.dataset.key) s.classList.add('hot');
}

function drop(x,y){
  const el=active; active=null;
  targets.querySelectorAll('.slot').forEach(s=>s.classList.remove('hot'));
  const s=slotAt(x,y);
  el.classList.remove('lifted');
  el.style.position=''; el.style.left=''; el.style.top='';
  el.style.width=''; el.style.height=''; el.style.zIndex='';
  if(s && !s.classList.contains('done') && s.dataset.key===el.dataset.key){
    s.classList.add('done');
    s.classList.add('cheer');
    setTimeout(()=>s.classList.remove('cheer'),500);
    el.classList.add('placed');
    burst(s);
    playCorrect();
    speak(el.dataset.ch);   // say the letter
    placed++;
    if(placed>=needed) setTimeout(()=>{ speak(NAME); playWin(); win.classList.add('show'); scheduleNextGame(); }, 700);
  } else if(s){
    sayUhOh();
  }
}

function burst(node){
  const r=node.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const cols=['#FFD23F','#FF6FB5','#4ECB5B','#3FA9FF','#FF8C24','#9B5DE5'];
  for(let i=0;i<12;i++){
    const c=document.createElement('div');
    c.className='confetti'; c.style.background=cols[i%cols.length];
    c.style.left=cx+'px'; c.style.top=cy+'px';
    document.body.appendChild(c);
    const ang=Math.random()*Math.PI*2, dist=50+Math.random()*60;
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    c.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${dx}px,${dy+50}px) rotate(${Math.random()*360}deg) scale(.3)`,opacity:0}
    ],{duration:700,easing:'ease-out'}).onfinish=()=>c.remove();
  }
}

start();
</script>
</body>
</html>
