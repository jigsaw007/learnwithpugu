<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ min-height:100%; }
  body{
    font-family:'Baloo 2',cursive,sans-serif;
    background:linear-gradient(160deg,#FFE7A8,#FFB4DC 45%,#A8E6FF);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    user-select:none; overflow-x:hidden; padding-bottom:30px;
  }
  .blob{ position:fixed; border-radius:50%; filter:blur(2px); opacity:.4; z-index:0;
    animation:float 6s ease-in-out infinite; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-22px)} }

  h1{ position:relative; z-index:1; margin:34px 0 6px; text-align:center;
    font-size:clamp(34px,8.5vw,76px); font-weight:800; color:#fff; line-height:1.05;
    text-shadow:0 5px 0 #FF6FB5, 0 10px 18px rgba(0,0,0,.2); }
  .sub{ position:relative; z-index:1; font-size:clamp(18px,4vw,26px); color:#fff;
    text-shadow:0 2px 4px rgba(0,0,0,.2); margin-bottom:30px; }

  .grid{ position:relative; z-index:1; width:100%; max-width:1000px;
    display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:24px; padding:0 22px; }

  .card{ text-decoration:none; border-radius:34px; padding:30px 20px 26px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    color:#fff; font-weight:800; font-size:clamp(22px,4vw,30px); text-align:center;
    box-shadow:0 10px 0 rgba(0,0,0,.16), 0 16px 26px rgba(0,0,0,.22);
    transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden;
    animation:rise .5s ease both; }
  .card:active{ transform:translateY(8px); box-shadow:0 2px 0 rgba(0,0,0,.16),0 8px 16px rgba(0,0,0,.22); }
  .card .art{ width:120px; height:120px; display:flex; align-items:center; justify-content:center; }
  .card .art svg{ width:100%; height:100%; }
  .card .emoji{ font-size:84px; line-height:1; }

  .pink{ background:linear-gradient(160deg,#FF8FC7,#FF5BA3); }
  .green{ background:linear-gradient(160deg,#7FE08C,#3CB54A); }
  .blue{ background:linear-gradient(160deg,#6FC5FF,#2E92E8); }
  .orange{ background:linear-gradient(160deg,#FFC15E,#FF8C24); }
  .purple{ background:linear-gradient(160deg,#C18CFF,#9B5DE5); }

  .soon{ filter:grayscale(.3); }
  .badge{ position:absolute; top:14px; right:-34px; background:#2B2B2B; color:#fff;
    font-size:13px; padding:5px 40px; transform:rotate(38deg); letter-spacing:1px; }

  @keyframes rise{ from{opacity:0; transform:translateY(30px)} to{opacity:1; transform:translateY(0)} }
  .card:nth-child(1){animation-delay:.05s}
  .card:nth-child(2){animation-delay:.15s}
  .card:nth-child(3){animation-delay:.25s}
  .card:nth-child(4){animation-delay:.35s}
</style>
