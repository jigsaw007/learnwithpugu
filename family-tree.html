<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; }
  body{
    font-family:'Baloo 2',cursive,sans-serif;
    background:linear-gradient(160deg,#BFEFFF,#D6F5DA 55%,#FFF3C4);
    display:flex; flex-direction:column; align-items:center;
    user-select:none; touch-action:none; position:fixed; inset:0;
  }
  .top{ width:100%; display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; z-index:30; }
  .back{ text-decoration:none; font-size:30px; width:46px; height:46px; border-radius:50%;
    background:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 0 rgba(0,0,0,.12); color:#6B4A2B; }
  .top .spacer{ width:46px; }

  .stage{ position:relative; flex:1; width:100%; display:flex; flex-direction:column; min-height:0; }

  .board{ position:relative; margin:0 auto; flex:1; min-height:0;
    aspect-ratio:1122/1402;
    background-image:url('images/tree-02.png');
    background-size:contain; background-position:center; background-repeat:no-repeat; }

  .slot{ position:absolute; transform:translate(-50%,-50%);
    width:var(--d,16%); aspect-ratio:1/1; z-index:2; border-radius:50%; }
  .slot .ring{ width:100%; height:100%; border-radius:50%; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s, box-shadow .12s; }
  .slot.hot .ring{ transform:scale(1.06);
    box-shadow:0 0 0 6px rgba(255,210,63,.85), 0 0 24px rgba(255,210,63,.7); }
  .slot.done .ring{ box-shadow:0 0 0 4px #7ED957; }
  .slot .pic{ width:100%; height:100%; border-radius:50%; object-fit:cover; animation:pop .35s ease; }
  @keyframes pop{ 0%{transform:scale(.3)} 70%{transform:scale(1.12)} 100%{transform:scale(1)} }

  .tray{ width:100%; z-index:20; flex:0 0 auto;
    display:flex; gap:14px; overflow-x:auto; overflow-y:hidden;
    justify-content:safe center;       /* center, but never clip when it overflows */
    padding:10px 18px 18px; scrollbar-width:none;
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.55)); }
  .tray::-webkit-scrollbar{ display:none; }
  .tok{ flex:0 0 auto; width:104px; height:128px; border-radius:26px;
    background:#fff; box-shadow:0 6px 0 rgba(0,0,0,.12),0 9px 16px rgba(0,0,0,.14);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    touch-action:none; cursor:grab; transition:transform .12s; }
  .tok:active{ transform:scale(.95); }
  .tok img{ width:76px; height:76px; border-radius:50%; object-fit:cover; pointer-events:none; }
  .tok .em{ font-size:64px; line-height:1; pointer-events:none; }
  .tok .nm{ font-size:14px; font-weight:800; color:#6B4A2B; pointer-events:none; white-space:nowrap; }
  .tok.placed{ visibility:hidden; }

  .drag{ position:fixed; z-index:999; width:104px; height:104px; border-radius:50%;
    pointer-events:none; box-shadow:0 8px 20px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center; background:#fff; overflow:hidden; }
  .drag img{ width:100%; height:100%; object-fit:cover; }
  .drag .em{ font-size:68px; }

  .win{ position:fixed; inset:0; z-index:1000; display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:18px;
    background:rgba(0,0,0,.45); backdrop-filter:blur(3px); }
  .win.show{ display:flex; }
  .win h2{ color:#fff; font-size:clamp(34px,9vw,64px); text-shadow:0 5px 0 #FF6FB5; }
  .win .again{ background:#7ED957; color:#fff; font-weight:800; font-size:24px;
    border:none; padding:14px 34px; border-radius:30px; box-shadow:0 6px 0 #4CAF50; }
  .conf{ position:fixed; top:-20px; width:14px; height:14px; z-index:1001; border-radius:3px; }
</style>

<body>
  <div class="top">
    <a class="back" href="index.html">‹</a>
    <div class="spacer"></div>
  </div>

  <div class="stage">
    <div class="board" id="board">
      <div class="slot" data-key="aaja"       style="left:35.3%;top:24.5%;--d:16%"></div>
      <div class="slot" data-key="aaji"       style="left:64.8%;top:24.5%;--d:16%"></div>
      <div class="slot" data-key="papa"       style="left:26.3%;top:43.5%;--d:16%"></div>
      <div class="slot" data-key="aama"       style="left:73.9%;top:43.5%;--d:16%"></div>
      <div class="slot" data-key="pugu"       style="left:50.0%;top:58.8%;--d:14.3%"></div>
      <div class="slot" data-key="thulopapa"  style="left:24.7%;top:69.0%;--d:15%"></div>
      <div class="slot" data-key="thulomamu"  style="left:75.9%;top:69.0%;--d:15%"></div>
      <div class="slot" data-key="didi"       style="left:50.0%;top:80.5%;--d:14.4%"></div>
    </div>

    <div class="tray" id="tray"></div>
  </div>

  <div class="win" id="win">
    <h2>Yay! &#127881;</h2>
    <button class="again" id="again">Play Again</button>
  </div>

<script src="common.js"></script>
<script>
window.playCorrect = window.playCorrect || function(){};
window.sayUhOh     = window.sayUhOh     || function(){};
window.playWin     = window.playWin     || function(){};
window.speak       = function(){};   /* spoken names off on this page; chime + applause stay */

const PEOPLE = [
  { key:'aaja',      nm:'Aaja',       emoji:'\u{1F474}',  say:'Aaja, Grandfather',   img:'images/aaja-02.png' },
  { key:'aaji',      nm:'Aaji',       emoji:'\u{1F475}',  say:'Aaji, Grandmother',   img:'images/aaji-02.png' },
  { key:'papa',      nm:'Papa',       emoji:'\u{1F468}',  say:'Papa, Father',        img:'images/papa-02.png' },
  { key:'aama',      nm:'Aama',       emoji:'\u{1F469}',  say:'Aama, Mother',        img:'images/aama-02.png' },
  { key:'pugu',      nm:'Me',         emoji:'\u{1F467}',  say:'Me, Pugu',            img:'images/pugu-02.png' },
  { key:'thulopapa', nm:'Thulo Papa', emoji:'\u{1F9D4}',  say:'Thulo Papa, Uncle',   img:'images/thulopapa-02.png' },
  { key:'thulomamu', nm:'Thulo Mamu', emoji:'\u{1F469}\u200D\u{1F9B0}', say:'Thulo Mamu, Aunty', img:'images/thulomamu-02.png' },
  { key:'didi',      nm:'Didi',       emoji:'\u{1F467}\u{1F3FB}', say:'Didi, Cousin Sister', img:'images/didi-02.png' },
];

const tray  = document.getElementById('tray');
const winEl = document.getElementById('win');
const slots = [...document.querySelectorAll('.slot')];

let dragEl=null, dragData=null, srcTok=null, matched=0, _nextTimer=null;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function start(){
  if(_nextTimer){ clearTimeout(_nextTimer); _nextTimer=null; }
  matched=0; tray.innerHTML=''; winEl.classList.remove('show');
  slots.forEach(s=>{ s.classList.remove('done'); s.innerHTML='<div class="ring"></div>'; });
  shuffle([...PEOPLE]).forEach(p=>{
    const tok=document.createElement('div'); tok.className='tok'; tok.dataset.key=p.key;
    const img=document.createElement('img'); img.src=p.img; img.alt=p.nm;
    const em=document.createElement('div'); em.className='em'; em.textContent=p.emoji; em.style.display='none';
    img.onerror=()=>{ img.style.display='none'; em.style.display='block'; };
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=p.nm;
    tok.append(img,em,nm);
    tok.addEventListener('pointerdown',e=>startDrag(e,p,tok));
    tray.appendChild(tok);
  });
}

function startDrag(e,p,tok){
  if(tok.classList.contains('placed')) return;
  e.preventDefault();
  srcTok=tok; dragData=p;
  dragEl=document.createElement('div'); dragEl.className='drag';
  const img=document.createElement('img'); img.src=p.img;
  const em=document.createElement('div'); em.className='em'; em.textContent=p.emoji; em.style.display='none';
  img.onerror=()=>{ img.style.display='none'; em.style.display='block'; };
  dragEl.append(img,em);
  document.body.appendChild(dragEl);
  moveDrag(e);
  window.addEventListener('pointermove',moveDrag);
  window.addEventListener('pointerup',endDrag);
}

function moveDrag(e){
  if(!dragEl) return;
  dragEl.style.left=(e.clientX-52)+'px';
  dragEl.style.top =(e.clientY-52)+'px';
  const hit=slotUnder(e.clientX,e.clientY);
  slots.forEach(s=>s.classList.toggle('hot', s===hit && !s.classList.contains('done')));
}

function slotUnder(x,y){
  for(const s of slots){
    if(s.classList.contains('done')) continue;
    const r=s.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const rad=r.width/2 + 18;
    if(Math.hypot(x-cx,y-cy)<=rad) return s;
  }
  return null;
}

function endDrag(e){
  window.removeEventListener('pointermove',moveDrag);
  window.removeEventListener('pointerup',endDrag);
  const hit=slotUnder(e.clientX,e.clientY);
  slots.forEach(s=>s.classList.remove('hot'));
  if(dragEl){ dragEl.remove(); dragEl=null; }
  if(hit && hit.dataset.key===dragData.key){
    placeInSlot(hit,dragData);
    srcTok.classList.add('placed');
    playCorrect(); speak(dragData.say);
    matched++;
    if(matched===PEOPLE.length) winGame();
  }else if(hit){
    sayUhOh();
  }
  srcTok=null; dragData=null;
}

function placeInSlot(slot,p){
  slot.classList.add('done');
  const ring=slot.querySelector('.ring'); ring.innerHTML='';
  const img=document.createElement('img'); img.className='pic'; img.src=p.img; img.alt=p.nm;
  const em=document.createElement('div'); em.className='em'; em.style.fontSize='42px'; em.textContent=p.emoji; em.style.display='none';
  img.onerror=()=>{ img.remove(); em.style.display='block'; ring.appendChild(em); };
  ring.appendChild(img);
}

function winGame(){
  winEl.classList.add('show');
  playWin(); setTimeout(playWin,400);
  speak('You did it! The family tree is complete!');
  confetti();
  if(typeof scheduleNextGame==='function'){
    _nextTimer=setTimeout(()=>{ if(typeof nextGameUrl==='function') location.href=nextGameUrl(); }, 5000);
  }
}

function confetti(){
  const colors=['#FF6FB5','#FFD23F','#7ED957','#6FC5FF','#C18CFF'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div'); c.className='conf';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[(Math.random()*colors.length)|0];
    document.body.appendChild(c);
    const dx=(Math.random()*2-1)*200, dur=1200+Math.random()*1200;
    c.animate([{transform:'translate(0,0) rotate(0)',opacity:1},
               {transform:'translate('+dx+'px,'+(innerHeight+60)+'px) rotate('+(Math.random()*720)+'deg)',opacity:1}],
              {duration:dur,easing:'cubic-bezier(.2,.6,.4,1)'}).onfinish=()=>c.remove();
  }
}

document.getElementById('again').addEventListener('click',start);
start();
</script>
</body>
