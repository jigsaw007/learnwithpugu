<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --yellow:#FFD23F; --purple:#9B5DE5; --orange:#FF8C24; --pink:#FF6FB5;
    --green:#4ECB5B; --red:#FF4D4D; --blue:#3FA9FF; --grey:#9AA5B1;
    --sky1:#FFF6D6; --sky2:#C8F0FF;
  }
  html,body{ height:100%; overflow:hidden; overscroll-behavior:none; }
  body{
    font-family:'Baloo 2',cursive,sans-serif;
    background:linear-gradient(160deg,var(--sky1),var(--sky2));
    display:flex; flex-direction:column; align-items:center;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  h1{
    margin:14px 0 4px; font-size:clamp(28px,6vw,52px); font-weight:800;
    color:#fff; letter-spacing:1px;
    text-shadow:0 4px 0 #FF6FB5, 0 8px 14px rgba(0,0,0,.18);
  }
  .stage{ flex:1; width:100%; max-width:1100px; display:flex; flex-direction:column;
    justify-content:space-around; padding:6px 14px 18px; }
  .row{ display:grid; grid-template-columns:repeat(8,1fr); gap:clamp(6px,1.4vw,18px);
    align-items:center; justify-items:center; }
  .row.bottom{ background:rgba(255,255,255,.45); border-radius:30px;
    padding:14px 8px; box-shadow:inset 0 4px 10px rgba(0,0,0,.06); }

  .pop{ width:100%; max-width:96px; aspect-ratio:64/130; position:relative; }
  .pop svg{ width:100%; height:100%; display:block; pointer-events:none; }

  .slot{ cursor:default; transition:transform .15s; }
  .slot.hot{ transform:scale(1.12); }
  .slot.done svg .body{ transition:fill .3s; }

  .drag{ cursor:grab; transition:transform .12s ease; touch-action:none;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,.22)); }
  .drag:active{ cursor:grabbing; }
  .drag.lifted{ position:fixed; z-index:999; pointer-events:none;
    transition:none; filter:drop-shadow(0 14px 14px rgba(0,0,0,.3)); }
  .drag.placed{ visibility:hidden; }

  .win{
    position:fixed; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    background:rgba(255,255,255,.82); backdrop-filter:blur(4px); z-index:2000;
  }
  .win.show{ display:flex; animation:pop .4s ease; }
  .win .big{ font-size:clamp(50px,14vw,120px); }
  .win h2{ font-size:clamp(32px,8vw,64px); color:#FF6FB5; font-weight:800; }
    .nextnote{ font-size:clamp(15px,3vw,22px); font-weight:800; color:#888; }
  .again{ font-family:inherit; font-size:28px; font-weight:800; color:#fff;
    background:var(--green); border:none; border-radius:40px;
    padding:14px 44px; box-shadow:0 6px 0 #2f9e3a; cursor:pointer; }
  .again:active{ transform:translateY(4px); box-shadow:0 2px 0 #2f9e3a; }
  @keyframes pop{ from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes wob{ 0%,100%{transform:rotate(0)} 25%{transform:rotate(-7deg)}
    75%{transform:rotate(7deg)} }
  .cheer{ animation:wob .5s ease; }
  .confetti{ position:fixed; width:12px; height:12px; z-index:1500; border-radius:2px; pointer-events:none; }
  .menu-btn{ position:fixed; top:14px; left:14px; z-index:1800; text-decoration:none;
    font-size:26px; background:#fff; width:50px; height:50px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 0 rgba(0,0,0,.15); }
  .menu-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15); }

<body>
  <h1>Match The Popsicle</h1>
  <a class="menu-btn" href="index.html">🏠</a>
  <div class="stage">
    <div class="row top" id="top"></div>
    <div class="row bottom" id="bottom"></div>
  </div>

  <div class="win" id="win">
    <div class="big">🎉🍦🎉</div>
    <h2>You Did It!</h2>
    <div class="nextnote">Next game starting…</div>
    <button class="again" onclick="start()">Play Again</button>
  </div>

<script src="common.js"></script>
<script>
const COLORS = [
  ["yellow","#FFD23F","#E6B800"],
  ["purple","#9B5DE5","#7B3FC4"],
  ["orange","#FF8C24","#E06E00"],
  ["pink","#FF6FB5","#E6478F"],
  ["green","#4ECB5B","#2F9E3A"],
  ["red","#FF4D4D","#D62828"],
  ["blue","#3FA9FF","#1E84D6"],
  ["grey","#9AA5B1","#6B7480"],
];

function popSVG(fill, stroke, mode){
  const bodyFill = mode==='outline' ? '#ffffff' : fill;
  const bodyStroke = stroke;
  return `<svg viewBox="0 0 64 130" xmlns="http://www.w3.org/2000/svg">
    <rect class="stick" x="27" y="96" width="10" height="32" rx="5" fill="#D9A066" stroke="#B07B3E" stroke-width="2"/>
    <path class="body" d="M32 4 C12 4 6 22 6 50 L6 86 C6 96 14 102 32 102 C50 102 58 96 58 86 L58 50 C58 22 52 4 32 4 Z"
      fill="${bodyFill}" stroke="${bodyStroke}" stroke-width="6" stroke-linejoin="round"/>
    ${mode==='full' ? `<ellipse cx="22" cy="34" rx="8" ry="14" fill="#ffffff" opacity="0.35"/>`:''}
  </svg>`;
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

const topRow = document.getElementById('top');
const bottom = document.getElementById('bottom');
const win = document.getElementById('win');
let matched = 0;

function start(){
  win.classList.remove('show');
  topRow.innerHTML=''; bottom.innerHTML=''; matched=0;

  COLORS.forEach(([name,fill,stroke])=>{
    const slot=document.createElement('div');
    slot.className='pop slot';
    slot.dataset.color=name;
    slot.dataset.fill=fill; slot.dataset.stroke=stroke;
    slot.innerHTML=popSVG(fill,stroke,'outline');
    topRow.appendChild(slot);
  });

  shuffle([...COLORS]).forEach(([name,fill,stroke])=>{
    const d=document.createElement('div');
    d.className='pop drag';
    d.dataset.color=name;
    d.innerHTML=popSVG(fill,stroke,'full');
    attachDrag(d);
    bottom.appendChild(d);
  });
}

let active=null, offX=0, offY=0, w=0, h=0, origin=null;

function attachDrag(el){
  el.addEventListener('pointerdown', e=>{
    if(el.classList.contains('placed')) return;
    active=el; origin=el.getBoundingClientRect();
    w=origin.width; h=origin.height;
    offX=e.clientX-origin.left; offY=e.clientY-origin.top;
    el.classList.add('lifted');
    el.style.width=w+'px'; el.style.height=h+'px';
    move(e.clientX,e.clientY);
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e=>{ if(active===el) move(e.clientX,e.clientY); });
  el.addEventListener('pointerup', e=>{ if(active===el) drop(e.clientX,e.clientY); });
}

function move(x,y){
  active.style.left=(x-offX)+'px';
  active.style.top=(y-offY)+'px';
  highlight(x,y);
}

function currentSlot(x,y){
  const slots=[...topRow.querySelectorAll('.slot')];
  for(const s of slots){
    const r=s.getBoundingClientRect();
    if(x>=r.left-10&&x<=r.right+10&&y>=r.top-10&&y<=r.bottom+10) return s;
  }
  return null;
}

function highlight(x,y){
  topRow.querySelectorAll('.slot').forEach(s=>s.classList.remove('hot'));
  const s=currentSlot(x,y);
  if(s&&!s.classList.contains('done')&&s.dataset.color===active.dataset.color) s.classList.add('hot');
}

function drop(x,y){
  const el=active; active=null;
  topRow.querySelectorAll('.slot').forEach(s=>s.classList.remove('hot'));
  const s=currentSlot(x,y);
  el.classList.remove('lifted');
  el.style.position=''; el.style.left=''; el.style.top='';
  el.style.width=''; el.style.height=''; el.style.zIndex='';
  if(s && !s.classList.contains('done') && s.dataset.color===el.dataset.color){
    s.classList.add('done');
    s.querySelector('.body').setAttribute('fill', s.dataset.fill);
    s.classList.add('cheer');
    setTimeout(()=>s.classList.remove('cheer'),500);
    el.classList.add('placed');
    burst(s);
    playCorrect();
    speak(s.dataset.color);
    matched++;
    if(matched===COLORS.length) setTimeout(()=>{ playWin(); win.classList.add('show'); scheduleNextGame(); },400);
  } else if(s){
    sayUhOh();
  }
}

function burst(slot){
  const r=slot.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const cols=['#FFD23F','#FF6FB5','#4ECB5B','#3FA9FF','#FF8C24','#9B5DE5'];
  for(let i=0;i<14;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.background=cols[i%cols.length];
    c.style.left=cx+'px'; c.style.top=cy+'px';
    document.body.appendChild(c);
    const ang=Math.random()*Math.PI*2, dist=60+Math.random()*70;
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    c.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${dx}px,${dy+60}px) rotate(${Math.random()*360}deg) scale(.3)`,opacity:0}
    ],{duration:700,easing:'ease-out'}).onfinish=()=>c.remove();
  }
}

start();
</script>
</body>
